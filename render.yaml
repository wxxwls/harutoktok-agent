services:
  - type: web
    name: harutoktok-agent
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HARUTOKTOK_STORE_DIR
        value: /tmp/harutoktok-data
      - key: HARUTOKTOK_SEED_DEMO
        value: "true"
